version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: notes-saver_db
    environment:
      POSTGRES_DB: notes-saver
      POSTGRES_USER: notes-saver_user
      POSTGRES_PASSWORD: notes-saver_pass
    ports:
      - "5432:5432"
    volumes:
      - notes-saver_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes-saver_user -d notes-saver"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  notes-saver_data: